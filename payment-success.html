<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — Elite Cooling</title>
<link rel="icon" type="image/png" href="assets/ac-unit.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --primary: #2563EB;
    --primary-dark: #1D4ED8;
    --green: #10B981;
    --text: #1A1A2E;
    --text-secondary: #666;
    --bg: #ffffff;
    --bg-warm: #FAFAF8;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-warm);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }
  .success-card {
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    max-width: 480px; width: 100%;
    text-align: center; padding: 3rem 2.5rem;
    animation: slideUp 0.6s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .success-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; margin: 0 auto 1.5rem;
    box-shadow: 0 8px 24px rgba(16,185,129,0.3);
    animation: popIn 0.5s ease-out 0.2s both;
  }
  @keyframes popIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  .success-card h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.6rem; color: var(--text); }
  .success-card p { color: var(--text-secondary); font-size: 1rem; line-height: 1.7; margin-bottom: 1.5rem; }
  .order-details {
    background: var(--bg-warm); border-radius: 12px;
    padding: 1.2rem; text-align: left; margin-bottom: 1.5rem;
    border: 1px solid #E8E8E3;
  }
  .order-details div { display: flex; justify-content: space-between; padding: 0.5rem 0; font-size: 0.9rem; }
  .order-details div span:first-child { color: var(--text-secondary); }
  .order-details div span:last-child { font-weight: 700; color: var(--text); }
  .btn {
    display: block; width: 100%; padding: 1rem; border-radius: 50px;
    text-decoration: none; font-weight: 700; font-size: 0.95rem;
    transition: all 0.3s ease; margin-bottom: 0.8rem;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
  .btn-whatsapp { background: #25D366; color: #fff; }
  .btn-whatsapp:hover { background: #1ebe57; transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .footer-text { font-size: 0.8rem; color: #999; margin-top: 1rem; }
</style>
</head>
<body>

<div class="success-card">
  <div class="success-icon"><i class="fas fa-check"></i></div>
  <h1>Payment Successful!</h1>
  <p>Your AC service has been booked and payment received. A technician will contact you within 15 minutes.</p>

  <div class="order-details" id="orderDetails">
    <div><span>Service</span><span id="svcName">—</span></div>
    <div><span>Amount Paid</span><span id="svcAmount">—</span></div>
    <div><span>Transaction ID</span><span id="txnId">—</span></div>
  </div>

  <a href="https://wa.me/919106915331?text=Hi%20Elite%20Cooling%2C%20I%20just%20paid%20online%20for%20AC%20service.%20Please%20confirm%20my%20booking." class="btn btn-whatsapp" target="_blank">
    <i class="fab fa-whatsapp"></i> Confirm on WhatsApp
  </a>
  <a href="index.html" class="btn btn-outline">Back to Home</a>

  <p class="footer-text">Questions? Call us at +91-91069-15331</p>
</div>

<script>
  // Parse session_id from URL and fetch details if you have a backend endpoint
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  if (sessionId) {
    document.getElementById('txnId').textContent = sessionId.slice(-12).toUpperCase();
  }
  // Try to restore service name from localStorage (set before redirect)
  const service = localStorage.getItem('ec_service') || 'AC Service';
  const amount = localStorage.getItem('ec_amount') || '—';
  document.getElementById('svcName').textContent = service;
  if (amount !== '—') document.getElementById('svcAmount').textContent = 'Rs. ' + amount;
</script>

</body>
</html>
